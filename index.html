<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>香水商品运营平台 v2</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fbf8f2;
      --panel-strong: #fffdf8;
      --ink: #2d241d;
      --muted: #736454;
      --line: #d8cdbf;
      --accent: #146356;
      --accent-soft: #d8ece7;
      --warn: #d97706;
      --warn-soft: #fce9ce;
      --danger: #b42318;
      --danger-soft: #f9dfdb;
      --good: #4c7a1f;
      --good-soft: #e4efd4;
      --shadow: 0 10px 30px rgba(45, 36, 29, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, rgba(20, 99, 86, 0.06), rgba(20, 99, 86, 0) 180px), var(--bg);
      color: var(--ink);
    }

    .shell {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
    }

    .subtitle {
      margin: 10px 0 0;
      max-width: 920px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: flex-start;
      min-width: 360px;
    }

    button, .file-label, input, select {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-strong);
      color: var(--ink);
      font-size: 13px;
    }

    button, .file-label {
      padding: 10px 14px;
      cursor: pointer;
      transition: .2s ease;
    }

    button:hover, .file-label:hover {
      transform: translateY(-1px);
      border-color: #bfae9a;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.ghost { background: transparent; }

    .file-label input { display: none; }

    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(216, 205, 191, .9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 18px;
      position: sticky;
      top: 20px;
      display: grid;
      gap: 18px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .card, .status-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, .58);
    }

    .card {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .field-group, .status-grid, .mapping-grid, .main {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
    }

    .field input, .field select, .mapping-row select {
      width: 100%;
      padding: 10px 12px;
      background: #fffefb;
    }

    .mapping-row {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .mapping-row strong {
      display: block;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .hint, .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .status-item {
      padding: 10px 12px;
    }

    .status-item strong {
      display: block;
      font-size: 18px;
      margin-top: 4px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .kpi {
      padding: 18px;
      min-height: 120px;
    }

    .kpi small {
      display: block;
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 12px;
    }

    .kpi strong {
      display: block;
      font-size: 30px;
      margin-bottom: 8px;
      line-height: 1;
    }

    .kpi p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .critical { background: linear-gradient(180deg, rgba(185, 35, 24, .08), rgba(185, 35, 24, 0)); }
    .warning { background: linear-gradient(180deg, rgba(217, 119, 6, .08), rgba(217, 119, 6, 0)); }
    .good { background: linear-gradient(180deg, rgba(20, 99, 86, .08), rgba(20, 99, 86, 0)); }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px;
    }

    .tab {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      font-size: 13px;
      cursor: pointer;
    }

    .tab.active {
      background: var(--accent-soft);
      border-color: rgba(20, 99, 86, .22);
      color: var(--accent);
      font-weight: 600;
    }

    .view {
      display: none;
      padding: 0 16px 16px;
    }

    .view.active {
      display: grid;
      gap: 16px;
    }

    .subgrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .box {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, .64);
      overflow: hidden;
    }

    .box-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(216, 205, 191, .9);
      background: rgba(255, 255, 255, .6);
    }

    .box-header h2, .box-header h3 {
      margin: 0;
      font-size: 15px;
    }

    .box-body { padding: 14px; }

    .preview-wrap, .table-wrap {
      max-height: 420px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid rgba(216, 205, 191, .9);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, .45);
      color: var(--muted);
      font-size: 12px;
      z-index: 1;
    }

    tr:last-child td { border-bottom: 0; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.good { color: var(--good); background: var(--good-soft); }
    .badge.warn { color: var(--warn); background: var(--warn-soft); }
    .badge.danger { color: var(--danger); background: var(--danger-soft); }
    .badge.neutral { color: #5b4d42; background: #ece4d7; }

    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .footer-note {
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 1200px) {
      .layout, .subgrid, .kpis { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .topbar { flex-direction: column; }
      .actions { min-width: 0; justify-content: flex-start; }
    }

    @media (max-width: 680px) {
      .mapping-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <h1>香水商品运营平台</h1>
        <p class="subtitle">现在已经支持识别你这类“90天销售明细 CSV”。系统会把订单商品流水自动聚合成店铺-SKU 的近90天销量。等你后续给库存和保质期文件，我们再把补货、临期和调拨判断完全接上。</p>
      </div>
      <div class="actions">
        <button id="load-sample" class="ghost">恢复示例数据</button>
        <button id="download-template" class="ghost">下载模板 CSV</button>
        <button id="download-transfer" class="ghost">导出调拨建议</button>
        <label class="file-label">
          导入 Excel / CSV
          <input id="file-input" type="file" accept=".csv,.xlsx,.xls">
        </label>
        <button id="save-local" class="primary">保存到本地浏览器</button>
      </div>
    </div>

    <div class="layout">
      <aside class="panel sidebar">
        <section>
          <h2 class="section-title">导入中心</h2>
          <div id="import-panel" class="card"></div>
        </section>

        <section>
          <h2 class="section-title">规则参数</h2>
          <div id="settings-form" class="field-group"></div>
        </section>

        <section>
          <h2 class="section-title">数据概况</h2>
          <div id="data-quality" class="status-grid"></div>
          <p class="hint">当前已经支持“90天销售明细 CSV”自动聚合。库存、在途、保质期还需要你后续再提供文件，补货、临期、调拨判断会更完整。</p>
        </section>
      </aside>

      <main class="main">
        <section id="kpi-grid" class="kpis"></section>

        <section class="panel">
          <div id="tabs" class="tabs"></div>
          <div id="view-dashboard" class="view active"></div>
          <div id="view-replenishment" class="view"></div>
          <div id="view-expiry" class="view"></div>
          <div id="view-slowmoving" class="view"></div>
          <div id="view-transfer" class="view"></div>
          <div id="view-master" class="view"></div>
        </section>

        <div class="footer-note">当前支持的导入方式有两种：1. 模板明细表导入。2. 你的 `90天销售.csv` 这类订单明细自动聚合导入。只有销售数据时，平台会优先展示销售排行和动销结果；补货、临期、调拨还需要库存和保质期文件补齐。</div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const sampleRows = [
      { sku: "AMBR-50", productName: "琥珀余温", brand: "Arome", series: "Signature", scentFamily: "东方木质", seasonTag: "秋冬", concentration: "EDP", sizeMl: 50, packType: "正装", store: "天猫旗舰店", batchNo: "A2408", sellableStock: 25, inTransit: 20, sales90d: 180, sales30d: 70, expiryDate: "2027-01-18" },
      { sku: "AMBR-50", productName: "琥珀余温", brand: "Arome", series: "Signature", scentFamily: "东方木质", seasonTag: "秋冬", concentration: "EDP", sizeMl: 50, packType: "正装", store: "上海久光店", batchNo: "A2408", sellableStock: 55, inTransit: 0, sales90d: 54, sales30d: 16, expiryDate: "2027-01-18" },
      { sku: "CITR-30", productName: "晨光橘园", brand: "Arome", series: "Daily", scentFamily: "柑橘清新", seasonTag: "春夏", concentration: "EDT", sizeMl: 30, packType: "正装", store: "深圳万象天地店", batchNo: "B2411", sellableStock: 42, inTransit: 0, sales90d: 60, sales30d: 20, expiryDate: "2026-11-20" },
      { sku: "ROSE-75", productName: "白玫长街", brand: "Maison Verre", series: "Fleurs", scentFamily: "花香", seasonTag: "四季", concentration: "EDP", sizeMl: 75, packType: "礼盒", store: "抖音旗舰店", batchNo: "C2404", sellableStock: 130, inTransit: 0, sales90d: 21, sales30d: 7, expiryDate: "2026-08-10" },
      { sku: "TEA-100", productName: "乌龙云雾", brand: "Maison Verre", series: "Archive", scentFamily: "茶香木质", seasonTag: "四季", concentration: "Parfum", sizeMl: 100, packType: "正装", store: "南京德基店", batchNo: "D2501", sellableStock: 24, inTransit: 0, sales90d: 63, sales30d: 24, expiryDate: "2028-01-15" }
    ];

    const defaultSettings = {
      leadTimeDays: 45,
      prepWindowDays: 60,
      safetyStockDays: 15,
      slowMoverDays: 150,
      expiryWarningDays: 120,
      transferReceiveDays: 35,
      transferKeepDays: 60,
      goodSellerDailySales: 0.4
    };

    const fieldMeta = [
      { key: "sku", label: "SKU 编码", required: true, aliases: ["sku", "sku编码", "货号", "商品编码", "编码"] },
      { key: "productName", label: "商品名称", required: true, aliases: ["productname", "商品名称", "品名", "商品名", "名称"] },
      { key: "brand", label: "品牌", aliases: ["brand", "品牌"] },
      { key: "series", label: "系列", aliases: ["series", "系列"] },
      { key: "scentFamily", label: "香型", aliases: ["scentfamily", "香型", "香调", "香调类型"] },
      { key: "seasonTag", label: "季节标签", aliases: ["seasontag", "季节标签", "季节"] },
      { key: "concentration", label: "浓度", aliases: ["concentration", "浓度"] },
      { key: "sizeMl", label: "容量(ml)", aliases: ["sizeml", "容量", "规格", "ml"] },
      { key: "packType", label: "包装类型", aliases: ["packtype", "包装类型", "包装", "类型"] },
      { key: "store", label: "门店 / 渠道", required: true, aliases: ["store", "门店", "店铺", "渠道", "shop"] },
      { key: "batchNo", label: "批次号", aliases: ["batchno", "batch", "批次", "批次号"] },
      { key: "sellableStock", label: "可售库存", required: true, aliases: ["sellablestock", "可售库存", "库存", "可用库存", "stock"] },
      { key: "inTransit", label: "在途库存", aliases: ["intransit", "在途", "在途库存", "未到货"] },
      { key: "sales90d", label: "近90天销量", aliases: ["sales90d", "近90天销量", "90天销量", "近三个月销量"] },
      { key: "sales30d", label: "近30天销量", aliases: ["sales30d", "近30天销量", "30天销量", "近一个月销量"] },
      { key: "expiryDate", label: "到期日", aliases: ["expirydate", "到期日", "保质期", "有效期"] }
    ];

    const settingsMeta = [
      ["leadTimeDays", "生产交期（天）"],
      ["prepWindowDays", "提前备货线（天）"],
      ["safetyStockDays", "安全库存天数"],
      ["slowMoverDays", "滞销阈值（可售天数）"],
      ["expiryWarningDays", "临期预警（剩余天数）"],
      ["transferReceiveDays", "调入目标库存天数"],
      ["transferKeepDays", "调出保留库存天数"],
      ["goodSellerDailySales", "好卖基线（日均销量）"]
    ];

    const tabs = [
      { id: "dashboard", label: "驾驶舱" },
      { id: "replenishment", label: "补货预警" },
      { id: "expiry", label: "临期管理" },
      { id: "slowmoving", label: "滞销分析" },
      { id: "transfer", label: "店铺调拨" },
      { id: "master", label: "主数据与标签" }
    ];

    const SALES_DETAIL_COLUMNS = ["商品名称", "归属店铺", "商品数量"];

    let state = {
      rows: loadRows(),
      settings: loadSettings(),
      meta: loadMeta(),
      importDraft: null,
      activeTab: "dashboard"
    };

    function loadRows() {
      const raw = localStorage.getItem("perfume-ops-rows");
      if (!raw) return sampleRows;
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) && parsed.length ? parsed : sampleRows;
      } catch {
        return sampleRows;
      }
    }

    function loadSettings() {
      const raw = localStorage.getItem("perfume-ops-settings");
      if (!raw) return { ...defaultSettings };
      try {
        return { ...defaultSettings, ...JSON.parse(raw) };
      } catch {
        return { ...defaultSettings };
      }
    }

    function loadMeta() {
      const raw = localStorage.getItem("perfume-ops-meta");
      if (!raw) return { lastImportName: "当前是示例数据", importedAt: "", dataKind: "sample" };
      try {
        return { lastImportName: "当前是示例数据", importedAt: "", dataKind: "sample", ...JSON.parse(raw) };
      } catch {
        return { lastImportName: "当前是示例数据", importedAt: "", dataKind: "sample" };
      }
    }

    function saveState() {
      localStorage.setItem("perfume-ops-rows", JSON.stringify(state.rows));
      localStorage.setItem("perfume-ops-settings", JSON.stringify(state.settings));
      localStorage.setItem("perfume-ops-meta", JSON.stringify(state.meta));
    }

    function asNumber(value) {
      if (value === null || value === undefined || value === "") return 0;
      const text = String(value).replace(/,/g, "").trim();
      const num = Number(text);
      return Number.isFinite(num) ? num : 0;
    }

    function normalizeText(value) {
      return String(value || "").trim().replace(/\s+/g, "").replace(/[_-]/g, "").toLowerCase();
    }

    function formatDateInput(value) {
      if (!value) return "";
      if (value instanceof Date && !Number.isNaN(value.getTime())) return value.toISOString().slice(0, 10);
      if (typeof value === "number" && value > 20000 && value < 70000) {
        const base = new Date(Date.UTC(1899, 11, 30));
        base.setUTCDate(base.getUTCDate() + value);
        return base.toISOString().slice(0, 10);
      }
      const text = String(value).trim();
      if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(text)) return new Date(text).toISOString().slice(0, 10);
      if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(text)) return new Date(text.replace(/\//g, "-")).toISOString().slice(0, 10);
      if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(text)) {
        const [m, d, y] = text.split("/");
        return new Date(`${y}-${m}-${d}`).toISOString().slice(0, 10);
      }
      return text;
    }

    function daysBetween(dateText) {
      if (!dateText) return 9999;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(dateText);
      if (Number.isNaN(target.getTime())) return 9999;
      target.setHours(0, 0, 0, 0);
      return Math.round((target - today) / 86400000);
    }

    function coverDays(stock, dailySales) {
      if (dailySales <= 0) return stock > 0 ? 9999 : 0;
      return stock / dailySales;
    }

    function dailySales90(row) {
      return asNumber(row.sales90d) / 90;
    }

    function formatNum(value) {
      return new Intl.NumberFormat("zh-CN").format(Math.round(value));
    }

    function formatDays(value) {
      if (value >= 9999) return "无动销";
      return `${Math.round(value)} 天`;
    }

    function formatDateTime(value) {
      if (!value) return "未记录";
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function badge(type, text) {
      return `<span class="badge ${type}">${text}</span>`;
    }

    function csvCell(value) {
      return `"${String(value ?? "").replace(/"/g, "\"\"")}"`;
    }

    function parseCsv(text) {
      const rows = [];
      let current = "";
      let line = [];
      let inQuotes = false;

      function pushCell() {
        line.push(current);
        current = "";
      }

      function pushLine() {
        if (line.length) rows.push(line);
        line = [];
      }

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === "\"") {
          if (inQuotes && next === "\"") {
            current += "\"";
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          pushCell();
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          pushCell();
          pushLine();
        } else {
          current += char;
        }
      }

      pushCell();
      pushLine();
      return rows.filter((row) => row.some((cell) => String(cell).trim() !== ""));
    }

    function decodeCsvBuffer(buffer) {
      const attempts = ["utf-8", "gb18030"];
      let best = { score: -1, text: "", rows: [] };

      attempts.forEach((encoding) => {
        try {
          const text = new TextDecoder(encoding).decode(buffer);
          const rows = parseCsv(text);
          const headers = rows[0] || [];
          const score = scoreHeaders(headers);
          if (score > best.score) {
            best = { score, text, rows };
          }
        } catch (_) {
          // Ignore failed decode attempts and keep the best successful one.
        }
      });

      return best;
    }

    function scoreHeaders(headers) {
      const headerSet = new Set((headers || []).map((header) => String(header).trim()));
      let score = 0;
      SALES_DETAIL_COLUMNS.forEach((column) => {
        if (headerSet.has(column)) score += 3;
      });
      fieldMeta.forEach((field) => {
        field.aliases.forEach((alias) => {
          if (headerSet.has(alias)) score += 1;
        });
      });
      return score;
    }

    function groupBy(list, keyFn) {
      return list.reduce((map, item) => {
        const key = keyFn(item);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
        return map;
      }, new Map());
    }

    function currentModel() {
      return computeModel(state.rows, state.settings);
    }

    function computeModel(rows, settings) {
      const cleanRows = rows.map((row) => ({
        ...row,
        sellableStock: asNumber(row.sellableStock),
        inTransit: asNumber(row.inTransit),
        sales90d: asNumber(row.sales90d),
        sales30d: asNumber(row.sales30d),
        sizeMl: asNumber(row.sizeMl),
        expiryDate: formatDateInput(row.expiryDate)
      }));
      const hasSalesData = cleanRows.some((row) => asNumber(row.sales90d) > 0);
      const hasInventoryData = cleanRows.some((row) => asNumber(row.sellableStock) > 0);

      const skuGroups = groupBy(cleanRows, (row) => row.sku);
      const storeGroups = groupBy(cleanRows, (row) => row.store);

      const skuSummaries = Array.from(skuGroups.entries()).map(([sku, items]) => {
        const first = items[0];
        const stock = items.reduce((sum, item) => sum + item.sellableStock, 0);
        const inTransit = items.reduce((sum, item) => sum + item.inTransit, 0);
        const sales90 = items.reduce((sum, item) => sum + item.sales90d, 0);
        const sales30 = items.reduce((sum, item) => sum + item.sales30d, 0);
        const daily = sales90 / 90;
        const stockCoverDays = coverDays(stock, daily);
        const targetStock = Math.ceil(daily * (settings.leadTimeDays + settings.safetyStockDays));
        const suggestedProduction = Math.max(0, Math.ceil(targetStock - stock - inTransit));
        const urgency = stockCoverDays <= settings.leadTimeDays ? "立即生产" : stockCoverDays <= settings.prepWindowDays ? "进入备货" : "观察";
        return {
          ...first,
          sku,
          stock,
          inTransit,
          sales90,
          sales30,
          daily,
          stockCoverDays,
          suggestedProduction,
          urgency,
          shortReason: urgency === "立即生产" ? "预计会在生产周期内卖空" : urgency === "进入备货" ? "库存进入备货窗口" : "库存覆盖仍然安全"
        };
      }).sort((a, b) => (hasSalesData ? b.sales90 - a.sales90 : b.stock - a.stock));

      const expiryRows = cleanRows.map((row) => {
        const network = skuSummaries.find((item) => item.sku === row.sku) || { daily: 0 };
        const daysLeft = daysBetween(row.expiryDate);
        const projectedCover = coverDays(row.sellableStock, dailySales90(row));
        const isGoodSeller = network.daily >= settings.goodSellerDailySales;
        const riskLevel = !row.expiryDate
          ? "缺到期日"
          : row.sellableStock <= 0
            ? "正常"
            : daysLeft <= 0
              ? "已过期"
              : (daysLeft <= settings.expiryWarningDays || projectedCover > daysLeft)
                ? "风险"
                : "正常";
        const action = riskLevel === "正常"
          ? "正常出货，继续按批次先进先出"
          : riskLevel === "缺到期日"
            ? "补齐批次到期信息后再做临期判断"
            : isGoodSeller
              ? "优先出旧批次，轻促销或调拨到高动销门店"
              : "降价清仓、组合促销，必要时停止补货并评估报损";
        return { ...row, daysLeft, isGoodSeller, riskLevel, action };
      }).sort((a, b) => a.daysLeft - b.daysLeft);

      const slowMoving = skuSummaries.map((item) => {
        const skuRows = cleanRows.filter((row) => row.sku === item.sku);
        const activeStores = skuRows.filter((row) => row.sales30d > 0).length;
        const totalStores = skuRows.length;
        let reason = "销售稳定";
        let action = "维持当前策略";
        if (item.stockCoverDays > settings.slowMoverDays) {
          if (activeStores > 0 && activeStores < totalStores) {
            reason = "部分门店动销，部分门店积压，渠道匹配有问题";
            action = "优先做调拨，把存货集中到高动销门店";
          } else if (item.daily < settings.goodSellerDailySales / 2) {
            reason = "整体需求偏弱，可能是价格或产品力问题";
            action = "停止新增生产，清货并复盘定价、包装和渠道";
          } else {
            reason = "库存结构偏重，周转明显偏慢";
            action = "做促销、加曝光，观察 2 至 4 周后的改善";
          }
        }
        return { ...item, activeStores, totalStores, reason, action };
      }).filter((item) => item.stockCoverDays > settings.slowMoverDays).sort((a, b) => b.stockCoverDays - a.stockCoverDays);

      const transferPlan = [];
      skuGroups.forEach((items, sku) => {
        const network = skuSummaries.find((item) => item.sku === sku);
        const stores = items.map((item) => {
          const daily = dailySales90(item);
          return {
            ...item,
            daily,
            cover: coverDays(item.sellableStock, daily),
            need: Math.max(0, Math.ceil(daily * settings.transferReceiveDays - item.sellableStock)),
            excess: Math.max(0, Math.floor(item.sellableStock - daily * settings.transferKeepDays))
          };
        });

        const receivers = stores.filter((item) => item.need > 0 && item.daily > 0).sort((a, b) => b.daily - a.daily);
        const donors = stores
          .filter((item) => item.excess > 0 || (item.sales30d === 0 && item.sellableStock > 0))
          .map((item) => ({ ...item, transferable: item.excess > 0 ? item.excess : Math.floor(item.sellableStock * 0.5) }))
          .sort((a, b) => b.transferable - a.transferable);

        receivers.forEach((receiver) => {
          let stillNeed = receiver.need;
          donors.forEach((donor) => {
            if (stillNeed <= 0 || donor.transferable <= 0 || donor.store === receiver.store) return;
            const qty = Math.min(stillNeed, donor.transferable);
            if (qty <= 0) return;
            transferPlan.push({
              sku,
              productName: network.productName,
              fromStore: donor.store,
              toStore: receiver.store,
              qty,
              fromCover: donor.cover,
              toCover: receiver.cover,
              reason: donor.daily < receiver.daily ? "从低动销店向高动销店集中库存" : "平衡门店库存，减少一端断货一端积压"
            });
            donor.transferable -= qty;
            stillNeed -= qty;
          });
        });
      });

      const transferSummary = groupBy(transferPlan, (item) => item.sku);
      const storeSummary = Array.from(storeGroups.entries()).map(([store, items]) => {
        const stock = items.reduce((sum, item) => sum + item.sellableStock, 0);
        const sales90 = items.reduce((sum, item) => sum + item.sales90d, 0);
        const daily = sales90 / 90;
        return { store, stock, sales90, coverDays: coverDays(stock, daily) };
      }).sort((a, b) => (hasSalesData ? b.sales90 - a.sales90 : b.stock - a.stock));

      return {
        rows: cleanRows,
        skuSummaries,
        replenishment: skuSummaries.slice().sort((a, b) => a.stockCoverDays - b.stockCoverDays),
        expiryRows,
        slowMoving,
        transferPlan,
        transferSummary,
        storeSummary,
        hasSalesData,
        hasInventoryData,
        kpis: {
          urgentReplenishmentCount: skuSummaries.filter((item) => item.stockCoverDays <= settings.leadTimeDays && item.stock > 0).length,
          expiryRiskCount: expiryRows.filter((item) => item.riskLevel === "风险" || item.riskLevel === "已过期").length,
          slowMovingCount: slowMoving.length,
          transferCount: transferPlan.length
        }
      };
    }

            <td>${item.activeStores}/${item.totalStores}</td>
            <td>${escapeHtml(item.reason)}</td>
            <td>${escapeHtml(item.action)}</td>
          </tr>
        `)
        : model.hasSalesData
          ? model.skuSummaries.slice().sort((a, b) => a.sales90 - b.sales90).slice(0, 20).map((item) => `
          <tr>
            <td>${escapeHtml(item.productName)}<br><span class="note">${escapeHtml(item.sku)}</span></td>
            <td>${formatNum(item.sales90)}</td>
            <td>${formatNum(item.sales30)}</td>
            <td>${escapeHtml(item.store)}</td>
            <td>${badge("neutral", "待库存")}</td>
          </tr>
        `)
          : [];
      const headers = model.hasSalesData && model.hasInventoryData
        ? ["SKU", "库存覆盖", "动销门店", "滞销原因判断", "建议动作"]
        : ["SKU", "近90天销量", "近30天估算", "门店", "状态"];
      renderTable("slowmoving-table", headers, rows, model.hasSalesData ? "暂无数据。" : "请先导入销售数据。");
    }

    function renderTransfer(model) {
      document.getElementById("view-transfer").innerHTML = `<div class="box"><div class="box-header"><h2>店铺调拨</h2><span class="note">调拨要等库存文件接入后才能真正计算。</span></div><div id="transfer-table"></div></div>`;
      renderTable("transfer-table", ["SKU", "调出门店", "调入门店", "建议数量", "原因"], model.transferPlan.map((item) => `
        <tr>
          <td>${escapeHtml(item.productName)}<br><span class="note">${escapeHtml(item.sku)}</span></td>
          <td>${escapeHtml(item.fromStore)}</td>
          <td>${escapeHtml(item.toStore)}</td>
          <td>${formatNum(item.qty)}</td>
          <td>${escapeHtml(item.reason)}</td>
        </tr>
      `), "当前还没有库存数据，所以这里暂时不会出现调拨建议。");
    }

    function renderMaster(model) {
      document.getElementById("view-master").innerHTML = `<div class="box"><div class="box-header"><h2>SKU 主数据与标签</h2><span class="note">这一页主要用来检查从销售明细聚合出来的商品骨架。</span></div><div id="master-table"></div></div>`;
      renderTable("master-table", ["SKU", "品牌", "商品名称", "门店", "包装类型", "近90天销量"], model.rows.slice().sort((a, b) => asNumber(b.sales90d) - asNumber(a.sales90d)).map((item) => `
        <tr>
          <td>${escapeHtml(item.sku)}</td>
          <td>${escapeHtml(item.brand || "-")}</td>
          <td>${escapeHtml(item.productName || "-")}</td>
          <td>${escapeHtml(item.store || "-")}</td>
          <td>${escapeHtml(item.packType || "-")}</td>
          <td>${formatNum(item.sales90d)}</td>
        </tr>
      `), "暂无数据。");
    }

    function renderViews(model) {
      renderDashboard(model);
      renderReplenishment(model);
      renderExpiry(model);
      renderSlowMoving(model);
      renderTransfer(model);
      renderMaster(model);
    }

    function render() {
      const model = currentModel();
      renderImportPanel();
      renderSettings();
      renderDataQuality(model);
      renderKpis(model);
      renderTabs();
      renderViews(model);
      saveState();
    }

    function templateCsv() {
      const headers = ["sku", "productName", "brand", "series", "scentFamily", "seasonTag", "concentration", "sizeMl", "packType", "store", "batchNo", "sellableStock", "inTransit", "sales90d", "sales30d", "expiryDate"];
      const lines = [headers.join(",")];
      sampleRows.forEach((row) => {
        lines.push(headers.map((key) => csvCell(row[key])).join(","));
      });
      return "\uFEFF" + lines.join("\n");
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    function autoDetectFieldMap(headers) {
      const normalizedHeaders = headers.map((header) => ({ original: header, normalized: normalizeText(header) }));
      const map = {};
      fieldMeta.forEach((field) => {
        const aliases = field.aliases.map(normalizeText);
        const match = normalizedHeaders.find((item) => aliases.includes(item.normalized));
        map[field.key] = match ? match.original : "";
      });
      return map;
    }

    function buildImportDraft(fileName, sheets) {
      return {
        fileName,
        sheets,
        sheetIndex: 0,
        fieldMap: autoDetectFieldMap(sheets[0].rows[0] || [])
      };
    }

    function getCurrentDraftSheet() {
      if (!state.importDraft) return null;
      return state.importDraft.sheets[state.importDraft.sheetIndex] || null;
    }

    function normalizeRowsFromMappedSheet(rows, fieldMap) {
      const [headers, ...body] = rows;
      const headerIndex = new Map(headers.map((header, index) => [header, index]));
      return body.map((line) => {
        const row = {};
        fieldMeta.forEach((field) => {
          const mappedHeader = fieldMap[field.key];
          const idx = headerIndex.has(mappedHeader) ? headerIndex.get(mappedHeader) : -1;
          row[field.key] = idx >= 0 ? line[idx] : "";
        });
        row.sizeMl = asNumber(row.sizeMl);
        row.sellableStock = asNumber(row.sellableStock);
        row.inTransit = asNumber(row.inTransit);
        row.sales90d = asNumber(row.sales90d);
        row.sales30d = asNumber(row.sales30d);
        row.expiryDate = formatDateInput(row.expiryDate);
        return row;
      }).filter((row) => row.sku && row.productName && row.store);
    }

    function detectSalesDetailSheet(headers) {
      const headerSet = new Set(headers.map((header) => String(header).trim()));
      const required = SALES_DETAIL_COLUMNS.every((column) => headerSet.has(column));
      const hasCode = headerSet.has("规格编码") || headerSet.has("商品编码") || headerSet.has("商品条码");
      return required && hasCode;
    }

    function findValue(row, headerIndex, names) {
      for (const name of names) {
        if (headerIndex.has(name)) {
          return row[headerIndex.get(name)];
        }
      }
      return "";
    }

    function parseSizeMlFromText(text) {
      const match = String(text || "").match(/(\d+(?:\.\d+)?)\s*ml/i);
      return match ? Number(match[1]) : 0;
    }

    function findInventoryHeaderRow(rows) {
      for (let i = 0; i < Math.min(rows.length, 12); i += 1) {
        const headers = (rows[i] || []).map((header) => String(header || "").trim());
        const headerSet = new Set(headers);
        const looksLikeInventory = headerSet.has("商品名称")
          && headerSet.has("商品编码")
          && headerSet.has("在途库存合计")
          && headerSet.has("实物库存合计")
          && headers.slice(11).some((header) => header && !header.includes("合计"));
        if (looksLikeInventory) {
          return { headerRowIndex: i, headers };
        }
      }
      return null;
    }

    function detectInventorySheet(rows) {
      return Boolean(findInventoryHeaderRow(rows));
    }

    function transformInventorySheet(rows) {
      const headerInfo = findInventoryHeaderRow(rows);
      if (!headerInfo) return [];

      const { headerRowIndex, headers } = headerInfo;
      const headerIndex = new Map(headers.map((header, index) => [String(header).trim(), index]));
      const storeColumns = headers
        .map((header, index) => ({ header: String(header || "").trim(), index }))
        .filter(({ header, index }) => index >= 11 && header && header !== "在途库存合计" && header !== "实物库存合计" && !header.includes("导出数据说明"));

      const grouped = new Map();

      rows.slice(headerRowIndex + 1).forEach((line) => {
        const productName = String(findValue(line, headerIndex, ["商品名称"]) || "").trim();
        const sku = String(findValue(line, headerIndex, ["商品编码", "规格编码", "商品条码"]) || "").trim();
        if (!productName && !sku) return;

        const resolvedSku = sku || productName;
        const brand = String(findValue(line, headerIndex, ["一级品牌"]) || "").trim();
        const primaryCategory = String(findValue(line, headerIndex, ["一级分类"]) || "").trim();
        const spec1 = String(findValue(line, headerIndex, ["规格项1"]) || "").trim();
        const spec2 = String(findValue(line, headerIndex, ["规格项2"]) || "").trim();
        const spec3 = String(findValue(line, headerIndex, ["规格项3"]) || "").trim();
        const unit = String(findValue(line, headerIndex, ["库存单位"]) || "").trim();
        const inTransitTotal = asNumber(findValue(line, headerIndex, ["在途库存合计"]));
        const stockTotal = asNumber(findValue(line, headerIndex, ["实物库存合计"]));
        const base = {
          sku: resolvedSku,
          productName,
          brand,
          series: "",
          scentFamily: primaryCategory || spec1 || "",
          seasonTag: "",
          concentration: "",
          sizeMl: parseSizeMlFromText(spec1 || spec2 || spec3 || productName),
          packType: spec1 || primaryCategory || unit || "",
          store: "",
          batchNo: "",
          sellableStock: 0,
          inTransit: 0,
          sales90d: 0,
          sales30d: 0,
          expiryDate: "",
          inventoryTotal: stockTotal,
          inventoryInTransitTotal: inTransitTotal
        };

        storeColumns.forEach(({ header, index }) => {
          const stock = asNumber(line[index]);
          if (stock <= 0) return;
          const key = `${resolvedSku}__${header}`;
          if (!grouped.has(key)) {
            grouped.set(key, { ...base, store: header });
          }
          grouped.get(key).sellableStock += stock;
        });
      });

      return Array.from(grouped.values()).sort((a, b) => b.sellableStock - a.sellableStock);
    }

    function mergeRowsBySkuStore(existingRows, incomingRows) {
      const merged = new Map();
      const keyOf = (row) => `${String(row.sku || "").trim()}__${String(row.store || "").trim()}`;
      const pickText = (nextValue, prevValue) => {
        const next = String(nextValue ?? "").trim();
        return next ? nextValue : prevValue;
      };

      existingRows.forEach((row) => {
        if (row.sku && row.store) {
          merged.set(keyOf(row), { ...row });
        }
      });

      incomingRows.forEach((row) => {
        if (!row.sku) return;
        const key = keyOf(row);
        const prev = merged.get(key);
        if (!prev) {
          merged.set(key, { ...row });
          return;
        }

        merged.set(key, {
          ...prev,
          ...row,
          sku: pickText(row.sku, prev.sku),
          productName: pickText(row.productName, prev.productName),
          brand: pickText(row.brand, prev.brand),
          series: pickText(row.series, prev.series),
          scentFamily: pickText(row.scentFamily, prev.scentFamily),
          seasonTag: pickText(row.seasonTag, prev.seasonTag),
          concentration: pickText(row.concentration, prev.concentration),
          packType: pickText(row.packType, prev.packType),
          batchNo: pickText(row.batchNo, prev.batchNo),
          store: pickText(row.store, prev.store),
          sizeMl: asNumber(row.sizeMl) || asNumber(prev.sizeMl),
          sellableStock: row.sellableStock !== undefined && row.sellableStock !== null && row.sellableStock !== ""
            ? asNumber(row.sellableStock)
            : asNumber(prev.sellableStock),
          inTransit: row.inTransit !== undefined && row.inTransit !== null && row.inTransit !== ""
            ? asNumber(row.inTransit)
            : asNumber(prev.inTransit),
          sales90d: Math.max(asNumber(prev.sales90d), asNumber(row.sales90d)),
          sales30d: Math.max(asNumber(prev.sales30d), asNumber(row.sales30d)),
          expiryDate: pickText(row.expiryDate, prev.expiryDate)
        });
      });

      return Array.from(merged.values());
    }

    function resolveDataKind(rows) {
      const hasSales = rows.some((row) => asNumber(row.sales90d) > 0);
      const hasInventory = rows.some((row) => asNumber(row.sellableStock) > 0);
      if (hasSales && hasInventory) return "combined";
      if (hasSales) return "sales90d";
      if (hasInventory) return "inventory";
      return "generic";
    }

    function commitImportedRows(incomingRows, sourceLabel) {
      const shouldReplace = state.meta.dataKind === "sample" || !state.rows.length;
      state.rows = mergeRowsBySkuStore(shouldReplace ? [] : state.rows, incomingRows);
      state.importDraft = null;
      state.meta.lastImportName = sourceLabel;
      state.meta.importedAt = new Date().toISOString();
      state.meta.dataKind = resolveDataKind(state.rows);
    }

    function transformSalesDetailRows(rows) {
      const [headers, ...body] = rows;
      const headerIndex = new Map(headers.map((header, index) => [String(header).trim(), index]));
      const grouped = new Map();

      body.forEach((line) => {
        const status = String(findValue(line, headerIndex, ["订单商品状态"]) || "");
        if (status.includes("关闭") || status.includes("取消")) return;
        const qty = asNumber(findValue(line, headerIndex, ["商品数量"]));
        if (qty <= 0) return;

        const productName = String(findValue(line, headerIndex, ["商品名称"]) || "").trim();
        const store = String(findValue(line, headerIndex, ["归属店铺"]) || "").trim();
        const specCode = String(findValue(line, headerIndex, ["规格编码"]) || "").trim();
        const productCode = String(findValue(line, headerIndex, ["商品编码"]) || "").trim();
        const productBarcode = String(findValue(line, headerIndex, ["商品条码"]) || "").trim();
        const specText = String(findValue(line, headerIndex, ["商品规格"]) || "").trim();
        const brand = String(findValue(line, headerIndex, ["商品品牌"]) || "").trim();
        const primaryCategory = String(findValue(line, headerIndex, ["商品一级分类"]) || "").trim();
        const productType = String(findValue(line, headerIndex, ["商品类型"]) || "").trim();

        const sku = specCode || productCode || productBarcode || `${productName}-${specText}`;
        const key = `${store}__${sku}`;
        const sizeMl = parseSizeMlFromText(specText || productName);

        if (!grouped.has(key)) {
          grouped.set(key, {
            sku,
            productName,
            brand,
            series: "",
            scentFamily: primaryCategory || "",
            seasonTag: "",
            concentration: "",
            sizeMl,
            packType: primaryCategory || productType || "",
            store,
            batchNo: "",
            sellableStock: 0,
            inTransit: 0,
            sales90d: 0,
            sales30d: 0,
            expiryDate: ""
          });
        }

        const item = grouped.get(key);
        item.sales90d += qty;
      });

      const result = Array.from(grouped.values()).map((item) => ({
        ...item,
        sales30d: Math.max(1, Math.round(item.sales90d / 3))
      }));

      return result.sort((a, b) => b.sales90d - a.sales90d);
    }

    async function handleImportFile(file) {
      const lowerName = file.name.toLowerCase();
      let sheets = [];

      if (lowerName.endsWith(".csv")) {
        const buffer = await file.arrayBuffer();
        const decoded = decodeCsvBuffer(buffer);
        const rows = decoded.rows;
        if (rows.length < 2) {
          window.alert("CSV 没有读到有效数据，请检查文件内容。");
          return;
        }
        sheets = [{ name: "CSV 数据", rows }];
      } else {
        if (!window.XLSX) {
          window.alert("Excel 解析库没有加载成功，请刷新页面后重试。");
          return;
        }
        const buffer = await file.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: "array", cellDates: true, raw: true });
        sheets = workbook.SheetNames.map((name) => ({
          name,
          rows: XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1, raw: true, defval: "" }).filter((row) => Array.isArray(row) && row.some((cell) => String(cell).trim() !== ""))
        })).filter((sheet) => sheet.rows.length >= 2);
      }

      if (!sheets.length) {
        window.alert("没有读到有效工作表，请检查文件内容。");
        return;
      }

      const importedBlocks = [];
      const importedLabels = [];

      sheets.forEach((sheet) => {
        const headers = sheet.rows[0] || [];
        if (detectSalesDetailSheet(headers)) {
          importedBlocks.push(...transformSalesDetailRows(sheet.rows));
          importedLabels.push(`${sheet.name} / 销售明细`);
          return;
        }

        if (detectInventorySheet(sheet.rows)) {
          importedBlocks.push(...transformInventorySheet(sheet.rows));
          importedLabels.push(`${sheet.name} / 库存横表`);
        }
      });

      if (importedBlocks.length) {
        commitImportedRows(importedBlocks, `${file.name} / ${importedLabels.join(" + ")}`);
        render();
        return;
      }

      state.importDraft = buildImportDraft(file.name, sheets);
      renderImportPanel();
    }

    function applyImportDraft() {
      const missingRequired = fieldMeta.filter((field) => field.required && !state.importDraft.fieldMap[field.key]);
      if (missingRequired.length) {
        window.alert(`还缺必填字段映射：${missingRequired.map((field) => field.label).join("、")}`);
        return;
      }

      const sheet = getCurrentDraftSheet();
      const normalized = normalizeRowsFromMappedSheet(sheet.rows, state.importDraft.fieldMap);
      if (!normalized.length) {
        window.alert("导入后没有有效记录，请检查映射是否正确，尤其是 SKU、商品名称和门店字段。");
        return;
      }

      commitImportedRows(normalized, `${state.importDraft.fileName} / ${sheet.name}`);
      render();
    }

    document.getElementById("download-template").addEventListener("click", () => {
      downloadFile("perfume_template.csv", templateCsv(), "text/csv;charset=utf-8;");
    });

    document.getElementById("download-transfer").addEventListener("click", () => {
      const model = currentModel();
      const lines = [["sku", "productName", "fromStore", "toStore", "qty", "reason"].join(",")];
      model.transferPlan.forEach((item) => {
        lines.push([item.sku, item.productName, item.fromStore, item.toStore, item.qty, item.reason].map(csvCell).join(","));
      });
      downloadFile("transfer_plan.csv", "\uFEFF" + lines.join("\n"), "text/csv;charset=utf-8;");
    });

    document.getElementById("load-sample").addEventListener("click", () => {
      state.rows = sampleRows;
      state.importDraft = null;
      state.meta.lastImportName = "当前是示例数据";
      state.meta.importedAt = new Date().toISOString();
      state.meta.dataKind = "sample";
      render();
    });

    document.getElementById("save-local").addEventListener("click", () => {
      saveState();
      window.alert("当前数据和规则已保存到本地浏览器。");
    });

    document.getElementById("file-input").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        await handleImportFile(file);
      } catch (error) {
        console.error(error);
        window.alert("导入失败，请检查文件格式是否正确。");
      } finally {
        event.target.value = "";
      }
    });

    render();
  </script>
</body>
